train:
  MIP:
    time_limit:    60000     # seconds per MIP solve call (greatly increased for quality)
    Threads:       32        # use more threads for faster solving
    MIPGap:        0.05      # 5% optimality gap (relaxed to allow solution diversity)
    PoolSolutions: 10        # collect up to 10 high-quality solutions
    PoolSearchMode: 2        # 2 = focus on diverse solutions of high quality

hybrid:
  max_iterations:             100    # outer loop cap
  max_attempts_per_community: 1000   # random sampler attempts per community per iter
  rebuild_mip_every:          1      # rebuild full MIP model every N iterations
  seed:                       42     # RNG seed for reproducibility

config:
  technique:        "MIP"
  author:           "anonymous"
  institution:      "anonymous"
  country:          "anonymous"
  include_students: false
