train:
  MIP:
    time_limit:    3600      # seconds per MIP solve call
    Threads:       8
    MIPGap:        0.01      # 1% optimality gap
    PoolSolutions: 10        # keep up to 10 solutions in pool

hybrid:
  max_iterations:             100    # outer loop cap
  max_attempts_per_community: 1000   # random sampler attempts per community per iter
  rebuild_mip_every:          1      # rebuild full MIP model every N iterations
  seed:                       42     # RNG seed for reproducibility

divide_conquer:
  max_partition_size:  50    # max classes per BFS partition
  max_retries:         100   # backtrack budget (conflict resolution rounds)
  use_soft_edges:      false # include soft constraints in BFS graph
  prefer_larger_first: true  # solve larger partitions first (they claim rooms first)

config:
  technique:        "MIP"
  author:           "anonymous"
  institution:      "anonymous"
  country:          "anonymous"
  include_students: false
